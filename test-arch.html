<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/main.css" />
<style>
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: var(--milk); }
  .hero-visual {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero-photo-wrap {
    position: relative;
    width: 320px;
    height: 400px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: 2rem;
    z-index: 1;
  }

  .blob-bg {
    position: absolute;
    bottom: 0; /* Align to bottom for flat arch */
    left: 0;
    width: 100%;
    height: 100%; /* Instead of 100%, let's define specific arch shape */
    background: var(--sage);
    border-radius: 200px 200px 0 0;
    z-index: -1;
    transform: none;
    transition: all 1s ease;
  }

  .arch-inner-line {
    position: absolute;
    top: 15px;
    left: 15px;
    right: 15px;
    bottom: 0;
    border: 2px solid var(--yellow);
    border-bottom: none;
    border-radius: 200px 200px 0 0;
    z-index: -1;
    pointer-events: none;
  }

  .hero-photo-wrap:hover .blob-bg {
    /* No border radius change on hover to keep the exact arch */
    border-radius: 200px 200px 0 0;
  }

  .hero-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
    border-radius: 200px 200px 0 0;
    /* Adjust mask if necessary, but might not be needed if image itself fits arch */
    -webkit-mask-image: none;
    mask-image: none;
    position: relative;
    z-index: 10;
    transition: transform 0.5s ease; /* changed from all 1s ease to focus on transform */
  }

  /* Zoom hover effect */
  .hero-photo-wrap:hover img {
    transform: scale(1.05);
  }

  /* SVG Floral Containers */
  .floral-svg {
    position: absolute;
    pointer-events: none;
    z-index: 15;
  }
  .floral-svg.top-left { top: -20px; left: -30px; transform: rotate(-10deg); }
  .floral-svg.top-right { top: 10px; right: -40px; transform: scaleX(-1) rotate(-30deg); }
  .floral-svg.bottom-left { bottom: 20px; left: -40px; transform: rotate(15deg); }
  .floral-svg.bottom-right { bottom: 0; right: -30px; transform: scaleX(-1) rotate(10deg); }

  /* Floating Animation */
  .float-anim {
    animation: floating 6s ease-in-out infinite;
  }
  .float-anim-delayed {
    animation: floating 6s ease-in-out 3s infinite;
  }
  @keyframes floating {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }
</style>
</head>
<body>
  <div class="hero-visual">
    <div class="hero-photo-wrap">
      <div class="blob-bg"></div>
      <div class="arch-inner-line"></div>

      <!-- Top Left Floral -->

        <path d="M115 65 Q 150 70 160 45 Q 135 35 115 65 Z" fill="white" />

          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(0)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(72)"/>

          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(216)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="5" fill="#ffc93c"/>
        </g>
        <g transform="translate(45, 175) scale(0.6)">
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(20)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(92)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(164)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(236)"/>

          <circle cx="0" cy="0" r="5" fill="#ffc93c"/>
        </g>
      </svg>

      <!-- Top Right Floral -->
      <svg class="floral-svg top-right float-anim-delayed" width="90" height="90" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M80 180 Q 80 100 140 30" stroke="white" stroke-width="4" fill="none" />
        <path d="M85 140 Q 115 140 125 120 Q 95 110 85 140 Z" fill="white" />
        <path d="M100 100 Q 135 105 150 80 Q 120 70 100 100 Z" fill="white" />
        <path d="M115 65 Q 150 70 160 45 Q 135 35 115 65 Z" fill="white" />
      </svg>

      <!-- Bottom Left Floral -->
      <svg class="floral-svg bottom-left float-anim-delayed" width="100" height="100" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
         <path d="M80 180 Q 80 100 140 30" stroke="white" stroke-width="4" fill="none" />
        <path d="M85 140 Q 115 140 125 120 Q 95 110 85 140 Z" fill="white" />
        <path d="M100 100 Q 135 105 150 80 Q 120 70 100 100 Z" fill="white" />
        <path d="M115 65 Q 150 70 160 45 Q 135 35 115 65 Z" fill="white" />
        <g transform="translate(80, 160) scale(1.2)">
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(0)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(72)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(144)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(216)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="5" fill="#ffc93c"/>
        </g>
      </svg>

      <!-- Bottom Right Floral -->
      <svg class="floral-svg bottom-right float-anim" width="140" height="140" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 180 Q 30 100 80 40" stroke="#ffc93c" stroke-width="3" fill="none" />
        <circle cx="70" cy="55" r="4" fill="#ffc93c" />
        <circle cx="50" cy="85" r="4" fill="#ffc93c" />
        <circle cx="38" cy="125" r="4" fill="#ffc93c" />
        <path d="M80 180 Q 80 100 140 30" stroke="white" stroke-width="3" fill="none" />
        <path d="M85 140 Q 115 140 125 120 Q 95 110 85 140 Z" fill="white" />
        <path d="M100 100 Q 135 105 150 80 Q 120 70 100 100 Z" fill="white" />
        <path d="M115 65 Q 150 70 160 45 Q 135 35 115 65 Z" fill="white" />
        <g transform="translate(80, 160)">
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(0)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(72)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(144)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(216)"/>
          <path d="M0,0 C-15,-10 -5,-25 0,-25 C5,-25 15,-10 0,0" fill="white" transform="rotate(288)"/>
          <circle cx="0" cy="0" r="5" fill="#ffc93c"/>
        </g>
      </svg>

      <img src="images/my_photo_nobg.png" alt="Muhammad Fadillah" loading="lazy" />
    </div>
  </div>
</body>
</html>
